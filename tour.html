<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tour Interativo 360° — Lumitria</title>
  <link rel="icon" type="image/x-icon" href="para-vriaricone.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --c:#00CFFF;--cg:rgba(0,207,255,.28);
      --dk:#06080F;--tx:#EBF1FF;--t2:#8CA0BC;--td:#4D637D;
      --br:rgba(255,255,255,.08)
    }
    html,body{width:100%;height:100%;overflow:hidden;background:var(--dk);
      font-family:'Inter',system-ui,sans-serif;color:var(--tx);
      -webkit-font-smoothing:antialiased;user-select:none}

    /* canvas ocupa tudo */
    #c{position:fixed;inset:0;width:100%;height:100%;display:block;
       cursor:grab;background:#000;transition:opacity .35s}
    #c:active{cursor:grabbing}

    /* ── loading ── */
    #ls{position:fixed;inset:0;z-index:500;background:var(--dk);
        display:flex;flex-direction:column;align-items:center;
        justify-content:center;gap:18px;transition:opacity .7s}
    #ls.out{opacity:0;pointer-events:none}
    #ls img{width:54px;height:54px;border-radius:50%;
            border:1px solid rgba(0,207,255,.3);
            box-shadow:0 0 20px rgba(0,207,255,.15)}
    .bt{width:190px;height:2px;background:rgba(255,255,255,.08);
        border-radius:2px;overflow:hidden}
    #lb{height:100%;width:0%;border-radius:2px;
        background:linear-gradient(90deg,var(--c),#0098CC);
        box-shadow:0 0 8px var(--cg);transition:width .2s}
    .lt{font-size:.76rem;color:var(--td);letter-spacing:.05em}

    /* ── header ── */
    #hd{position:fixed;top:0;left:0;right:0;z-index:200;
        display:flex;align-items:center;justify-content:space-between;
        padding:16px 28px;
        background:linear-gradient(to bottom,rgba(6,8,15,.92),transparent);
        pointer-events:none}
    #hd>*{pointer-events:all}
    .ll{display:flex;align-items:center;text-decoration:none}
    .ll img{width:44px;height:44px;border-radius:50%;object-fit:cover;
            border:1px solid rgba(0,207,255,.25);
            box-shadow:0 0 14px rgba(0,207,255,.12)}
    #sl{display:flex;align-items:center;gap:8px;font-size:.76rem;
        font-weight:500;color:var(--t2);background:rgba(6,8,15,.75);
        border:1px solid var(--br);padding:7px 16px;border-radius:100px;
        backdrop-filter:blur(16px)}
    .dot{width:6px;height:6px;border-radius:50%;background:var(--c);
         box-shadow:0 0 8px var(--cg);flex-shrink:0;
         animation:blink 2.4s ease-in-out infinite}
    #bk{display:flex;align-items:center;gap:7px;
        background:rgba(6,8,15,.75);border:1px solid var(--br);
        color:var(--t2);font-size:.78rem;font-weight:500;
        padding:7px 16px;border-radius:100px;cursor:pointer;
        backdrop-filter:blur(16px);text-decoration:none;
        transition:color .2s,border-color .2s}
    #bk:hover{color:var(--tx);border-color:rgba(0,207,255,.3)}

    /* ── nav ── */
    #nav{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);
         z-index:200;display:flex;align-items:center;gap:18px;
         background:rgba(6,8,15,.78);border:1px solid var(--br);
         padding:13px 26px;border-radius:100px;
         backdrop-filter:blur(20px);
         box-shadow:0 8px 32px rgba(0,0,0,.4)}
    .sb{display:flex;flex-direction:column;align-items:center;gap:5px;
        cursor:pointer;opacity:.38;transition:opacity .3s;
        background:none;border:none;padding:2px 6px;color:inherit}
    .sb:hover{opacity:.72}
    .sb.on{opacity:1}
    .pip{width:7px;height:7px;border-radius:50%;background:var(--t2);
         transition:background .3s,box-shadow .3s,transform .3s}
    .sb.on .pip{background:var(--c);box-shadow:0 0 10px var(--cg);transform:scale(1.3)}
    .pl{font-size:.60rem;font-weight:600;color:var(--t2);
        letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;
        transition:color .3s}
    .sb.on .pl{color:var(--c)}
    .nd{width:24px;height:1px;background:var(--br);flex-shrink:0}

    /* ── hint ── */
    #ht{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
        z-index:200;display:flex;align-items:center;gap:6px;
        font-size:.70rem;color:var(--td);pointer-events:none;
        transition:opacity 1.2s}
    #ht.out{opacity:0}

    /* ── overlay de entrada ── */
    #ov{position:fixed;inset:0;z-index:300;
        display:flex;flex-direction:column;align-items:center;
        justify-content:center;
        background:rgba(6,8,15,.94);backdrop-filter:blur(24px);
        transition:opacity .9s;padding:24px;text-align:center}
    #ov.out{opacity:0;pointer-events:none}
    .ot{display:inline-flex;align-items:center;gap:7px;font-size:.68rem;
        font-weight:600;color:var(--c);border:1px solid rgba(0,207,255,.22);
        padding:5px 14px;border-radius:100px;margin-bottom:26px;
        letter-spacing:.12em;text-transform:uppercase;
        background:rgba(0,207,255,.07)}
    #ov h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,3.4rem);
           font-weight:800;line-height:1.12;letter-spacing:-.025em;
           color:var(--tx);margin-bottom:16px;max-width:560px}
    #ov h1 em{font-style:normal;color:var(--c)}
    #ov p{font-size:.98rem;color:var(--t2);max-width:440px;
          line-height:1.72;margin-bottom:38px}
    #sb{display:inline-flex;align-items:center;gap:10px;
        background:linear-gradient(135deg,#00CFFF,#0098CC);color:#020D14;
        font-family:'Inter',sans-serif;font-size:.95rem;font-weight:700;
        padding:14px 32px;border-radius:12px;border:none;cursor:pointer;
        box-shadow:0 0 28px rgba(0,207,255,.38),0 8px 28px rgba(0,0,0,.4);
        transition:transform .22s,box-shadow .22s}
    #sb:hover{transform:translateY(-2px);
              box-shadow:0 0 44px rgba(0,207,255,.55),0 12px 36px rgba(0,0,0,.45)}

    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ls">
  <img src="assets/images/logo-lumitria.png" alt="Lumitria">
  <div class="bt"><div id="lb"></div></div>
  <span class="lt" id="lt">Carregando…</span>
</div>

<header id="hd">
  <a href="index.html" class="ll">
    <img src="assets/images/logo-lumitria.png" alt="Lumitria">
  </a>
  <div id="sl"><span class="dot"></span><span id="sn">Tour 360°</span></div>
  <a href="index.html" id="bk">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
      <path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Voltar ao site
  </a>
</header>

<div id="ht">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
    <path d="M15 3a9 9 0 11-9 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M15 3l-3-3m3 3l-3 3" stroke="currentColor" stroke-width="1.5"
      stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  Clique e arraste para explorar
</div>

<nav id="nav">
  <button class="sb on" onclick="goTo(0)">
    <div class="pip"></div><span class="pl">Ambiente 1</span>
  </button>
  <div class="nd"></div>
  <button class="sb" onclick="goTo(1)">
    <div class="pip"></div><span class="pl">Ambiente 2</span>
  </button>
  <div class="nd"></div>
  <button class="sb" onclick="goTo(2)">
    <div class="pip"></div><span class="pl">Ambiente 3</span>
  </button>
</nav>

<div id="ov">
  <div class="ot"><span class="dot"></span>Tour Interativo 360°</div>
  <h1>Explore o projeto<br><em>como nunca antes.</em></h1>
  <p>Navegue pelos ambientes, descubra cada detalhe e visualize o espaço com total clareza.</p>
  <button id="sb" onclick="startTour()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
      <path d="M5 3l14 9-14 9V3z" fill="currentColor"/>
    </svg>
    Iniciar tour
  </button>
</div>

<script>
/* =====================================================
   CONFIGURAÇÃO DAS CENAS
===================================================== */
var SCENES = [
  { name: 'Ambiente 1', src: 'assets/images/Panorama1.jpg' },
  { name: 'Ambiente 2', src: 'assets/images/Panorama2.jpg' },
  { name: 'Ambiente 3', src: 'assets/images/Panorama3.jpg' }
];

/* =====================================================
   WEBGL — configuração inicial
===================================================== */
var canvas = document.getElementById('c');
var gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

/* Shaders —————————————————————————————————————————
   Vertex: quad fullscreen
   Fragment: projeção esférica equiretangular correta  */
var VS = `
attribute vec2 a;
void main(){ gl_Position = vec4(a,0,1); }
`;

var FS = `
precision highp float;
uniform sampler2D uT;
uniform float uYaw;
uniform float uPitch;
uniform float uFov;
uniform vec2  uRes;
const float PI  = 3.14159265;
const float TAU = 6.28318530;
void main(){
  vec2 uv = (gl_FragCoord.xy / uRes) * 2.0 - 1.0;
  uv.y = -uv.y;
  float asp = uRes.x / uRes.y;
  float th  = tan(uFov * .5 * PI / 180.0);
  vec3 r = normalize(vec3(uv.x*asp*th, uv.y*th, -1.0));

  /* pitch */
  float cp=cos(-uPitch*PI/180.0), sp=sin(-uPitch*PI/180.0);
  vec3 r1=vec3(r.x, r.y*cp - r.z*sp, r.y*sp + r.z*cp);

  /* yaw */
  float cy=cos(uYaw*PI/180.0), sy=sin(uYaw*PI/180.0);
  vec3 r2=vec3(r1.x*cy + r1.z*sy, r1.y, -r1.x*sy + r1.z*cy);

  float u = atan(r2.x,-r2.z)/TAU + 0.5;
  float v = asin(clamp(r2.y,-1.0,1.0))/PI + 0.5;
  gl_FragColor = texture2D(uT, vec2(u,v));
}
`;

function mkShader(t,s){ var sh=gl.createShader(t); gl.shaderSource(sh,s); gl.compileShader(sh); return sh; }
var prog = gl.createProgram();
gl.attachShader(prog, mkShader(gl.VERTEX_SHADER,VS));
gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog);

var aPos = gl.getAttribLocation(prog,'a');
var uT   = gl.getUniformLocation(prog,'uT');
var uYaw = gl.getUniformLocation(prog,'uYaw');
var uPit = gl.getUniformLocation(prog,'uPitch');
var uFov = gl.getUniformLocation(prog,'uFov');
var uRes = gl.getUniformLocation(prog,'uRes');

var qBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, qBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

/* =====================================================
   CANVAS SIZE
===================================================== */
var W=1, H=1;
function resize(){
  W = window.innerWidth; H = window.innerHeight;
  canvas.width=W; canvas.height=H;
  gl.viewport(0,0,W,H);
}
resize();
window.addEventListener('resize', resize);

/* =====================================================
   TEXTURAS
===================================================== */
var texCache = {};
var curTex   = null;

function loadTex(src, cb){
  if(texCache[src]){ cb(texCache[src]); return; }
  var img = new Image();
  img.onload = function(){
    var tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGB,gl.RGB,gl.UNSIGNED_BYTE,img);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.REPEAT);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR_MIPMAP_LINEAR);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
    gl.generateMipmap(gl.TEXTURE_2D);
    texCache[src]=tex; cb(tex);
  };
  img.src = src;
}

/* =====================================================
   ESTADO DA CÂMERA
===================================================== */
var yaw=0, pitch=0, tYaw=0, tPitch=0, fov=90, drag=false;
var autoRot = 0.015;
var curIdx  = 0;

/* =====================================================
   RENDER
===================================================== */
function draw(){
  if(!curTex) return;
  gl.useProgram(prog);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, curTex);
  gl.bindBuffer(gl.ARRAY_BUFFER, qBuf);
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);
  gl.uniform1i(uT,0);
  gl.uniform1f(uYaw,yaw);
  gl.uniform1f(uPit,pitch);
  gl.uniform1f(uFov,fov);
  gl.uniform2f(uRes,W,H);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}

function loop(){
  requestAnimationFrame(loop);
  if(!drag) tYaw += autoRot;
  yaw   += (tYaw   - yaw)   * 0.07;
  pitch += (tPitch - pitch) * 0.07;
  pitch  = Math.max(-80, Math.min(80, pitch));
  draw();
}
loop();

/* =====================================================
   TROCA DE CENA
===================================================== */
function goTo(idx){
  if(idx === curIdx) return;
  curIdx = idx;
  canvas.style.opacity = '0';
  document.getElementById('sn').textContent = SCENES[idx].name;
  document.querySelectorAll('.sb').forEach(function(b,i){ b.classList.toggle('on',i===idx); });
  loadTex(SCENES[idx].src, function(tex){
    curTex = tex;
    setTimeout(function(){ canvas.style.opacity='1'; }, 300);
  });
}

/* =====================================================
   INPUT — mouse
===================================================== */
var mx=0,my=0,mYaw=0,mPitch=0;
canvas.addEventListener('mousedown',function(e){
  drag=true; mx=e.clientX; my=e.clientY; mYaw=yaw; mPitch=pitch;
  document.getElementById('ht').classList.add('out');
});
window.addEventListener('mousemove',function(e){
  if(!drag) return;
  tYaw   = mYaw   - (e.clientX-mx)*0.25;
  tPitch = mPitch + (e.clientY-my)*0.15;
});
window.addEventListener('mouseup',function(){ drag=false; });

/* INPUT — touch */
var tx=0,ty=0,tYaw0=0,tPitch0=0,pDist=0;
canvas.addEventListener('touchstart',function(e){
  if(e.touches.length===1){
    drag=true; tx=e.touches[0].clientX; ty=e.touches[0].clientY;
    tYaw0=yaw; tPitch0=pitch;
    document.getElementById('ht').classList.add('out');
  } else if(e.touches.length===2){
    pDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                     e.touches[0].clientY-e.touches[1].clientY);
  }
},{passive:true});
window.addEventListener('touchmove',function(e){
  if(e.touches.length===1&&drag){
    tYaw   = tYaw0   - (e.touches[0].clientX-tx)*0.25;
    tPitch = tPitch0 + (e.touches[0].clientY-ty)*0.15;
  } else if(e.touches.length===2){
    var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                     e.touches[0].clientY-e.touches[1].clientY);
    if(pDist>0){ fov=Math.max(40,Math.min(120,fov*pDist/d)); }
    pDist=d;
  }
},{passive:true});
window.addEventListener('touchend',function(){ drag=false; pDist=0; });

/* zoom com scroll */
canvas.addEventListener('wheel',function(e){
  fov=Math.max(40,Math.min(120,fov+e.deltaY*0.05));
},{passive:true});

/* =====================================================
   LOADING SCREEN
===================================================== */
var lbEl=document.getElementById('lb');
var ltEl=document.getElementById('lt');
var bW=0, bPh=0;
var bIv=setInterval(function(){
  bPh===0 ? (bW=Math.min(bW+Math.random()*5,70), bW>=70&&(bPh=1))
           : (bW=Math.min(bW+.08,93));
  lbEl.style.width=bW+'%';
},120);

loadTex(SCENES[0].src, function(tex){
  clearInterval(bIv);
  lbEl.style.width='100%';
  ltEl.textContent='Pronto!';
  curTex = tex;
  setTimeout(function(){
    var ls=document.getElementById('ls');
    ls.classList.add('out');
    setTimeout(function(){ ls.style.display='none'; },750);
    /* pré-carrega as outras cenas em background */
    for(var i=1;i<SCENES.length;i++)(function(n){ loadTex(SCENES[n].src,function(){}); })(i);
  },300);
});

/* =====================================================
   OVERLAY
===================================================== */
function startTour(){
  var ov=document.getElementById('ov');
  ov.classList.add('out');
  setTimeout(function(){ ov.style.display='none'; },950);
  setTimeout(function(){ document.getElementById('ht').classList.add('out'); },7000);
}
</script>
</body>
</html>
