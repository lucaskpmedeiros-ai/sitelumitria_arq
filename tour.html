<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tour Interativo 360° — Lumitria</title>
  <link rel="icon" type="image/x-icon" href="para-vriaricone.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

  <!-- Pannellum — local, sem CDN -->
  <link rel="stylesheet" href="libs/pannellum/pannellum.css">
  <script src="libs/pannellum/pannellum.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cyan: #00CFFF; --cyan-glow: rgba(0,207,255,0.28);
      --dark: #06080F; --text: #EBF1FF;
      --text-2: #8CA0BC; --text-dim: #4D637D;
      --border: rgba(255,255,255,0.08);
    }
    html, body { width:100%; height:100%; overflow:hidden; background:var(--dark);
      font-family:'Inter',system-ui,sans-serif; color:var(--text);
      -webkit-font-smoothing:antialiased; user-select:none; }

    /* Pannellum container */
    #panorama {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Remove UI padrão do Pannellum que não queremos */
    .pnlm-ui .pnlm-about-msg,
    .pnlm-ui .pnlm-zoom-controls { display: none !important; }

    /* ── Loading ── */
    #loadScreen {
      position: fixed; inset: 0; z-index: 500; background: var(--dark);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 18px; transition: opacity 0.7s;
    }
    #loadScreen.gone { opacity: 0; pointer-events: none; }
    #loadScreen img { width: 54px; height: 54px; border-radius: 50%;
      border: 1px solid rgba(0,207,255,0.3);
      box-shadow: 0 0 20px rgba(0,207,255,0.15); }
    .bar-track { width: 190px; height: 2px; background: rgba(255,255,255,0.08);
      border-radius: 2px; overflow: hidden; }
    #loadBar { height: 100%; width: 0%; border-radius: 2px;
      background: linear-gradient(90deg, var(--cyan), #0098CC);
      box-shadow: 0 0 8px var(--cyan-glow); transition: width 0.3s; }
    .load-txt { font-size: 0.76rem; color: var(--text-dim); letter-spacing: 0.05em; }

    /* ── Header ── */
    #topBar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 28px;
      background: linear-gradient(to bottom, rgba(6,8,15,0.92) 0%, transparent 100%);
      pointer-events: none;
    }
    #topBar > * { pointer-events: all; }
    .logo-lnk { display: flex; align-items: center; text-decoration: none; }
    .logo-lnk img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover;
      border: 1px solid rgba(0,207,255,0.25);
      box-shadow: 0 0 14px rgba(0,207,255,0.12); }
    #sceneLabel { display: flex; align-items: center; gap: 8px; font-size: 0.76rem;
      font-weight: 500; color: var(--text-2); background: rgba(6,8,15,0.75);
      border: 1px solid var(--border); padding: 7px 16px; border-radius: 100px;
      backdrop-filter: blur(16px); }
    .ldot { width: 6px; height: 6px; border-radius: 50%; background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan-glow); flex-shrink: 0;
      animation: blink 2.4s ease-in-out infinite; }
    #backBtn { display: flex; align-items: center; gap: 7px;
      background: rgba(6,8,15,0.75); border: 1px solid var(--border);
      color: var(--text-2); font-size: 0.78rem; font-weight: 500;
      padding: 7px 16px; border-radius: 100px; cursor: pointer;
      backdrop-filter: blur(16px); text-decoration: none;
      transition: color 0.2s, border-color 0.2s; }
    #backBtn:hover { color: var(--text); border-color: rgba(0,207,255,0.3); }

    /* ── Nav de cenas ── */
    #sceneNav {
      position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
      z-index: 200; display: flex; align-items: center; gap: 18px;
      background: rgba(6,8,15,0.78); border: 1px solid var(--border);
      padding: 13px 26px; border-radius: 100px; backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .sbtn { display: flex; flex-direction: column; align-items: center; gap: 5px;
      cursor: pointer; opacity: 0.38; transition: opacity 0.3s;
      background: none; border: none; padding: 2px 6px; color: inherit; }
    .sbtn:hover { opacity: 0.72; }
    .sbtn.on { opacity: 1; }
    .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--text-2);
      transition: background 0.3s, box-shadow 0.3s, transform 0.3s; }
    .sbtn.on .pip { background: var(--cyan); box-shadow: 0 0 10px var(--cyan-glow);
      transform: scale(1.3); }
    .plbl { font-size: 0.60rem; font-weight: 600; color: var(--text-2);
      letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap;
      transition: color 0.3s; }
    .sbtn.on .plbl { color: var(--cyan); }
    .ndiv { width: 24px; height: 1px; background: var(--border); flex-shrink: 0; }

    /* ── Hint ── */
    #hint { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      z-index: 200; display: flex; align-items: center; gap: 6px; font-size: 0.70rem;
      color: var(--text-dim); pointer-events: none; transition: opacity 1.2s; }
    #hint.gone { opacity: 0; }

    /* ── Overlay de entrada ── */
    #overlay { position: fixed; inset: 0; z-index: 300; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      background: rgba(6,8,15,0.94); backdrop-filter: blur(24px);
      transition: opacity 0.9s; padding: 24px; text-align: center; }
    #overlay.gone { opacity: 0; pointer-events: none; }
    .ov-tag { display: inline-flex; align-items: center; gap: 7px; font-size: 0.68rem;
      font-weight: 600; color: var(--cyan); border: 1px solid rgba(0,207,255,0.22);
      padding: 5px 14px; border-radius: 100px; margin-bottom: 26px;
      letter-spacing: 0.12em; text-transform: uppercase; background: rgba(0,207,255,0.07); }
    #overlay h1 { font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 3.4rem); font-weight: 800;
      line-height: 1.12; letter-spacing: -0.025em; color: var(--text);
      margin-bottom: 16px; max-width: 560px; }
    #overlay h1 em { font-style: normal; color: var(--cyan); }
    #overlay p { font-size: 0.98rem; color: var(--text-2); max-width: 440px;
      line-height: 1.72; margin-bottom: 38px; }
    #startBtn { display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, #00CFFF 0%, #0098CC 100%); color: #020D14;
      font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 700;
      padding: 14px 32px; border-radius: 12px; border: none; cursor: pointer;
      box-shadow: 0 0 28px rgba(0,207,255,0.38), 0 8px 28px rgba(0,0,0,0.4);
      transition: transform 0.22s, box-shadow 0.22s; }
    #startBtn:hover { transform: translateY(-2px);
      box-shadow: 0 0 44px rgba(0,207,255,0.55), 0 12px 36px rgba(0,0,0,0.45); }

    /* ── Hotspots customizados ── */
    .hs-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
    .hs-circle {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(0,207,255,0.15); border: 2px solid rgba(0,207,255,0.8);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 20px rgba(0,207,255,0.4);
      position: relative;
      transition: transform 0.2s, background 0.2s;
    }
    .hs-circle::before {
      content: '';
      position: absolute;
      width: 62px; height: 62px; border-radius: 50%;
      border: 2px solid rgba(0,207,255,0.4);
      animation: hs-pulse 2s ease-in-out infinite;
    }
    .hs-circle svg { color: var(--cyan); filter: drop-shadow(0 0 4px var(--cyan)); }
    .hs-wrap:hover .hs-circle { transform: scale(1.12); background: rgba(0,207,255,0.3); }
    .hs-label { font-size: 0.68rem; font-weight: 600; color: rgba(255,255,255,0.9);
      letter-spacing: 0.06em; text-transform: uppercase;
      background: rgba(6,8,15,0.75); border: 1px solid rgba(0,207,255,0.25);
      padding: 4px 12px; border-radius: 100px; white-space: nowrap;
      backdrop-filter: blur(8px); }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes hs-pulse {
      0%   { transform: scale(1);    opacity: 0.7; }
      60%  { transform: scale(1.45); opacity: 0; }
      100% { transform: scale(1);    opacity: 0; }
    }
  </style>
</head>
<body>

<!-- Pannellum container -->
<div id="panorama"></div>

<!-- Loading -->
<div id="loadScreen">
  <img src="assets/images/logo-lumitria.png" alt="Lumitria">
  <div class="bar-track"><div id="loadBar"></div></div>
  <span class="load-txt" id="loadTxt">Carregando experiência…</span>
</div>

<!-- Header -->
<header id="topBar">
  <a href="index.html" class="logo-lnk">
    <img src="assets/images/logo-lumitria.png" alt="Lumitria">
  </a>
  <div id="sceneLabel">
    <span class="ldot"></span>
    <span id="sceneName">Tour 360°</span>
  </div>
  <a href="index.html" id="backBtn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
      <path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Voltar ao site
  </a>
</header>

<!-- Hint -->
<div id="hint">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
    <path d="M15 3a9 9 0 11-9 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M15 3l-3-3m3 3l-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  Clique e arraste para explorar
</div>

<!-- Nav de cenas -->
<nav id="sceneNav">
  <button class="sbtn on" onclick="goTo(0)">
    <div class="pip"></div><span class="plbl">Ambiente 1</span>
  </button>
  <div class="ndiv"></div>
  <button class="sbtn" onclick="goTo(1)">
    <div class="pip"></div><span class="plbl">Ambiente 2</span>
  </button>
  <div class="ndiv"></div>
  <button class="sbtn" onclick="goTo(2)">
    <div class="pip"></div><span class="plbl">Ambiente 3</span>
  </button>
</nav>

<!-- Overlay de entrada -->
<div id="overlay">
  <div class="ov-tag"><span class="ldot"></span>Tour Interativo 360°</div>
  <h1>Explore o projeto<br><em>como nunca antes.</em></h1>
  <p>Navegue pelos ambientes, descubra cada detalhe e visualize o espaço com total clareza — antes da primeira pedra ser assentada.</p>
  <button id="startBtn" onclick="startTour()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
      <path d="M5 3l14 9-14 9V3z" fill="currentColor"/>
    </svg>
    Ver demonstração completa
  </button>
</div>

<script>
'use strict';

/* ── Cenas ── */
var SCENES = [
  {
    name: 'Ambiente 1',
    src: 'https://res.cloudinary.com/dzn9q1rkt/image/upload/v1776426468/Panorama1_oomkm4.png',
    hotspots: [
      { pitch: -15, yaw: 0, to: 1, label: 'Siga o caminho' }
    ]
  },
  {
    name: 'Ambiente 2',
    src: 'https://res.cloudinary.com/dzn9q1rkt/image/upload/v1776427656/Panorama2_kcgwlp.png',
    hotspots: [
      { pitch: 0, yaw: -90, to: 0, label: 'Siga o caminho' },
      { pitch: 0, yaw: 80,  to: 2, label: 'Siga o caminho' }
    ]
  },
  {
    name: 'Ambiente 3',
    src: 'https://res.cloudinary.com/dzn9q1rkt/image/upload/v1776426468/Panorama3_tblowv.png',
    hotspots: [
      { pitch: 0, yaw: 180, to: 1, label: 'Siga o caminho' }
    ]
  }
];

var viewer = null;
var curIdx = 0;

/* ── Oculta loading screen imediatamente — overlay cobre tudo ── */
(function () {
  var ls = document.getElementById('loadScreen');
  if (ls) ls.style.display = 'none';
}());

/* ── Inicializa Pannellum ── */
function buildHotspots(sceneIdx) {
  return SCENES[sceneIdx].hotspots.map(function (hs) {
    return {
      pitch: hs.pitch,
      yaw: hs.yaw,
      type: 'custom',
      cssClass: 'hs-wrap',
      createTooltipFunc: function (el) {
        el.innerHTML =
          '<div class="hs-circle">' +
            '<svg width="18" height="18" viewBox="0 0 24 24" fill="none">' +
              '<path d="M12 5l7 7-7 7M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>' +
            '</svg>' +
          '</div>' +
          '<span class="hs-label">' + hs.label + '</span>';
      },
      clickHandlerFunc: function () { goTo(hs.to); }
    };
  });
}

function initViewer(sceneIdx) {
  if (viewer) { viewer.destroy(); viewer = null; }

  viewer = pannellum.viewer('panorama', {
    type: 'equirectangular',
    panorama: SCENES[sceneIdx].src,
    autoLoad: true,
    autoRotate: -2,
    autoRotateInactivityDelay: 3000,
    showControls: false,
    mouseZoom: true,
    hfov: 100,
    minHfov: 60,
    maxHfov: 120,
    pitch: 0,
    yaw: 0,
    hotSpots: buildHotspots(sceneIdx)
  });

  /* load event: nenhuma ação necessária — overlay já cobre a tela */
}

function goTo(idx) {
  if (idx === curIdx) return;
  curIdx = idx;
  updateNav(idx);
  document.getElementById('sceneName').textContent = SCENES[idx].name;

  /* Fade suave */
  var pano = document.getElementById('panorama');
  pano.style.transition = 'opacity 0.35s';
  pano.style.opacity = '0';
  setTimeout(function () {
    initViewer(idx);
    pano.style.opacity = '1';
  }, 350);
}

function updateNav(idx) {
  document.querySelectorAll('.sbtn').forEach(function (b, i) {
    b.classList.toggle('on', i === idx);
  });
}

function startTour() {
  var ov = document.getElementById('overlay');
  ov.classList.add('gone');
  setTimeout(function () { ov.style.display = 'none'; }, 950);
  setTimeout(function () { document.getElementById('hint').classList.add('gone'); }, 7000);
  /* Viewer já está carregando em background — não reinicializa */
}

/* Pré-carrega em background enquanto o overlay está visível */
initViewer(0);
</script>
</body>
</html>
